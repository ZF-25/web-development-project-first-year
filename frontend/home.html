<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grid">
        <!-- HEADER -->
       <header class="header">
  <div class="container-fluid">
    <div class="row align-items-center">

      <!-- LOGO -->
      <div class="col-6 col-md-4">
        <div class="logo d-flex align-items-center gap-3">
          <a href="landingPage.html">
            <img src="images/logo.png" alt="Logo" class="logo-img">
          </a>
        </div>
      </div>

      <!-- PROFILE -->
      <div class="col-6 col-md-8 text-end">
        <div class="profile-menu">
          <img src="./images/profilepic.jpeg" alt="Profile" class="profile-img">

          <div class="profile-dropdown">
            <a href="library.html">Library</a>
            <a href="upload.html">Create Posts</a>
            <a href="settings.html">Settings</a>
            <a href="login.html">Logout</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</header>

        <!-- Основной контент -->
        <div class="background">
            <div class="container mt-4">
                <div class="row g-4" id="categories-container">
                    <!-- Карточки будут здесь динамически -->
                </div>
            </div>
        </div>
    </div>

<script type="module">

// ===============================
// IMPORT AUTH
// ===============================
import { requireAuth, getUser } from "./auth.js";

requireAuth();


// ===============================
// CONFIG
// ===============================
const API_BASE = "http://localhost:3000";


// ===============================
// INIT
// ===============================
document.addEventListener("DOMContentLoaded", () => {
    const user = getUser();
    const user_id = user?.id;

    setupProfileMenu();
    setupLogout();
    loadCategories();
    loadUserProfileImages(user_id);
});


// ===============================
// PROFILE MENU
// ===============================
function setupProfileMenu() {
    const profileMenu = document.querySelector('.profile-menu');

    if (profileMenu) {
        profileMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            profileMenu.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            profileMenu.classList.remove('active');
        });
    }
}


// ===============================
// LOGOUT (FIXED)
// ===============================
function setupLogout() {
    const logoutLink = document.querySelector('.profile-dropdown a[href="login.html"]');

    if (logoutLink) {
        logoutLink.addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("user");
            window.location.replace("login.html");
        });
    }
}


// ===============================
// LOAD PROFILE IMAGE (FIXED)
// ===============================
async function loadUserProfileImages(user_id) {
    if (!user_id) return;

    try {
        const res = await fetch(`${API_BASE}/api/users/${user_id}`);
        const user = await res.json();

        const imagePath = user.profile_pic
            ? `${API_BASE}/uploads/${user.profile_pic}?t=${Date.now()}`
            : "./images/profilepic.jpg";

        document.querySelectorAll(".profile-img").forEach(img => {
            img.src = imagePath;
        });

    } catch (err) {
        console.error("Profile image error:", err);
    }
}


// ===============================
// LOAD CATEGORIES
// ===============================
async function loadCategories() {
    const container = document.getElementById('categories-container');

    try {
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3">Loading categories...</p>
            </div>
        `;

        const res = await fetch(`${API_BASE}/categories`);
        const categories = await res.json();

        if (!categories.length) {
            container.innerHTML = `<div class="col-12 text-center py-5"><h3>No categories found</h3></div>`;
            return;
        }

        renderCategories(categories);
        initCardHandlers();

    } catch (error) {
        console.error("Fetch error:", error);
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <h4 class="text-danger">Failed to load categories</h4>
            </div>
        `;
    }
}


// ===============================
// RENDER CATEGORIES
// ===============================
function renderCategories(categories) {
    const container = document.getElementById('categories-container');
    container.innerHTML = '';

    categories.forEach(cat => {
        container.innerHTML += `
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 text-center" data-category-id="${cat.id}">
                    <div class="card-body">
                        <h3 class="card-title">${cat.name}</h3>
                        <div class="dropdown mt-3"></div>
                    </div>
                </div>
            </div>
        `;
    });
}


// ===============================
// CLICK HANDLERS (UNCHANGED LOGIC BUT FIXED)
// ===============================
function initCardHandlers() {
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', async function (e) {
            if (e.target.closest('.subject') || e.target.closest('a')) return;

            const categoryId = this.dataset.categoryId;
            if (!categoryId) return;

            document.querySelectorAll('.card').forEach(c => c !== this && c.classList.remove('active'));

            const wasActive = this.classList.contains('active');
            this.classList.toggle('active');

            const dropdown = this.querySelector('.dropdown');

            if (!wasActive && dropdown && dropdown.children.length === 0) {
                await loadSubcategories(categoryId, dropdown);
            }
        });
    });

    document.addEventListener('click', async function (e) {
        const subject = e.target.closest('.subject');
        if (!subject) return;

        e.stopImmediatePropagation();

        const subcategoryId = subject.dataset.subcategoryId;
        if (!subcategoryId) return;

        const subDropdown = subject.querySelector('.sub-dropdown');
        if (!subDropdown) return;

        const wasActive = subject.classList.contains('active');

        const currentCard = subject.closest('.card');
        if (currentCard) {
            currentCard.querySelectorAll('.subject').forEach(s => {
                if (s !== subject) s.classList.remove('active');
            });
        }

        subject.classList.toggle('active');

        if (!wasActive && subDropdown.children.length === 0) {
            await loadTopics(subcategoryId, subDropdown);
        }
    });
}


// ===============================
// LOAD SUBCATEGORIES
// ===============================
async function loadSubcategories(categoryId, dropdownElement) {
    dropdownElement.innerHTML = `<div class="text-center py-3"><div class="spinner-border spinner-border-sm"></div></div>`;

    try {
        const res = await fetch(`${API_BASE}/subcategories/${categoryId}`);
        const subcategories = await res.json();

        let html = '';
        subcategories.forEach(sub => {
            html += `
                <div class="dropdown-item subject" data-subcategory-id="${sub.id}">
                    • ${sub.name}
                    <div class="sub-dropdown"></div>
                </div>
            `;
        });

        dropdownElement.innerHTML = html;

    } catch {
        dropdownElement.innerHTML = `<p class="text-danger text-center py-2">Error loading</p>`;
    }
}


// ===============================
// LOAD TOPICS
// ===============================
async function loadTopics(subcategoryId, subDropdownElement) {
    subDropdownElement.innerHTML = `<div class="text-center py-2"><div class="spinner-border spinner-border-sm"></div></div>`;

    try {
        const res = await fetch(`${API_BASE}/topics/${subcategoryId}`);
        const topics = await res.json();

        let html = '';
        topics.forEach(topic => {
            html += `<a href="page.html?topic=${encodeURIComponent(topic.name)}">${topic.name}</a>`;
        });

        subDropdownElement.innerHTML = html;

    } catch {
        subDropdownElement.innerHTML = `<p class="text-danger small">Failed to load</p>`;
    }
}

</script>
</body>
</html>
