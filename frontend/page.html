<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Worm — <span id="topic-name">Topic</span></title>
</head>
<body>

<!-- header -->
<header class="category-header">
  <div class="container-fluid">
    <div class="header-content">

      <!-- logo -->
      <div class="logo">
        <div class="category-icon">
          <picture>
  <!-- mobile version -->
  <source srcset="./images/app-logo-image.png" media="(max-width: 768px)">
  
  <!-- deskpot version  -->
  <a href="landingPage.html"> <img src="./images/logo.png" alt="Brain Worm">
</picture>
        </div>
      </div>

      <div class="category-title-wrapper">
        <div class="category-badge" id="category-badge"></div>
      </div>

      <!-- avatar and dropdown menu -->
      <div class="profile-menu">
        <div class="profile-avatar">
          <img src="./images/profilepic.jpg" alt="Profile" class="profile-img" onclick="toggleMenu()">
        </div>
        <div id="dropdown" class="dropdown">
          <a href="library.html">Library</a>
          <a href="upload.html">Create Posts</a>
          <a href="settings.html">Settings</a>
          <a href="login.html">Logout</a>
        </div>
      </div>

    </div>
  </div>
</header>

<div class="background">
    <!-- home -->
<div class="sub-bar d-flex flex-column flex-md-row align-items-center gap-2">
  <button class="home-btn" aria-label="home-page">
   <a href="home.html" class="home-btn"> <img src="./images/home.png" alt="" width="28" height="28"></a>
  </button>

      <div class="search-container">
        <span class="search-icon">
          <img src="./images/search.png" alt="Поиск" width="24" height="24">
        </span>
        <input type="text" class="search-input" placeholder="post search...">
      </div>
    </div>
  
    <!-- dynamic list of posts -->
    <div class="posts-container" id="posts-container">
    </div>
</div>

<script>
    // === settings of API ===
    const API_BASE = 'http://localhost:3000';
    window.addEventListener('DOMContentLoaded', () => {
        //reads parameters from the address bar
    const urlParams = new URLSearchParams(window.location.search); 
    let topicName = urlParams.get('topic'); 

    if (!topicName && window.location.port == '5500') {
        topicName = 'Topic';
        window.location.search = `?topic=${encodeURIComponent(topicName)}`;
    }
});

    async function loadPostsByTopic() {
        const urlParams = new URLSearchParams(window.location.search);
        let topicName = urlParams.get('topic');

        if (!topicName) {
            document.getElementById('category-badge').textContent = 'topic is not found';
            return;
        }
        topicName = topicName.trim();

        // uploading titles
        document.getElementById('category-badge').textContent = topicName.toUpperCase();
        document.title = `Brain Worm — ${topicName}`;

        const container = document.getElementById('posts-container');
        container.innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Loading...</p>
            </div>`;

        try {
            console.log("FETCH:", `${API_BASE}/api/posts/topic/${encodeURIComponent(topicName)}`);
const res = await fetch(`${API_BASE}/api/posts/topic/${encodeURIComponent(topicName)}`);            
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            
            const posts = await res.json();
            console.log(` Received  "${topicName}":`, posts.length);

            container.innerHTML = '';

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <h4 class="text-muted">There are no posts regarding this topic</h4>
                        <p class="text-secondary">Try to chose another topic</p>
                    </div>`;
                return;
            }
            posts.forEach(post => {
                const postHTML = `
                    <div class="post-row">
                        <div class="post-title">
                            <a href="post.html?post_id=${post.id}">${post.title}</a>
                        </div>
                        <div class="post-desc">${post.short_content || (post.content ? post.content.substring(0, 150) + '...' : '')}</div>
                        <div class="author">
                            <span class="author-name">${post.author || 'Anonymous'}</span>
                            <img src="./images/profilepic.jpg" alt="" class="avatar">
                        </div>
                    </div>`;
                container.innerHTML += postHTML;
            });

        } catch (err) {
            console.error(" Ошибка загрузки постов:", err);
            container.innerHTML = `
                <div class="text-center py-5 text-danger">
                    failed to load posts.<br>
                    male sure that server is connected to the port 3000.
                </div>`;
        }
    }

    // === Dropdown menu ===
    document.addEventListener('DOMContentLoaded', () => {
        const profileMenu = document.querySelector('.profile-menu');
        const dropdown = document.querySelector('.dropdown');

        if (document.querySelector('.profile-avatar')) {
            document.querySelector('.profile-avatar').addEventListener('click', function(e) {
                e.stopPropagation();
                profileMenu.classList.toggle('active');
            });
        }

        document.addEventListener('click', function(e) {
            if (profileMenu && !profileMenu.contains(e.target)) {
                profileMenu.classList.remove('active');
            }
        });
        if (dropdown) {
            dropdown.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }
        loadPostsByTopic();
    });
</script>

</body>
</html>
