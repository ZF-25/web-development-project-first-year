<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Worm — <span id="topic-name">Topic</span></title>
</head>
<body>

<!-- header -->
<header class="category-header">
  <div class="container-fluid">
    <div class="header-content">

      <!-- logo -->
      <div class="logo">
        <div class="category-icon">
          <picture>
  <!-- mobile version -->
  <source srcset="./images/app-logo-image.png" media="(max-width: 768px)">
  
  <!-- deskpot version  -->
  <a href="landingPage.html"> <img src="./images/logo.png" alt="Brain Worm">
</picture>
        </div>
      </div>

      <div class="category-title-wrapper">
        <div class="category-badge" id="category-badge"></div>
      </div>

      <!-- avatar and dropdown menu -->
      <div class="profile-menu">
        <div class="profile-avatar">
          <img src="./images/profilepic.jpg" alt="Profile" class="profile-img" onclick="toggleMenu()">
        </div>
        <div id="dropdown" class="dropdown">
          <a href="library.html">Library</a>
          <a href="upload.html">Create Posts</a>
          <a href="settings.html">Settings</a>
          <a href="#" class="logout-btn">Logout</a>
        </div>
      </div>

    </div>
  </div>
</header>

<div class="background">
    <!-- home -->
<div class="sub-bar d-flex flex-column flex-md-row align-items-center gap-2">
  <button class="home-btn" aria-label="home-page">
   <a href="home.html" class="home-btn"> <img src="./images/home.png" alt="" width="28" height="28"></a>
  </button>

      <div class="search-container">
        <span class="search-icon">
          <img src="./images/search.png" alt="Поиск" width="24" height="24">
        </span>
        <input type="text" class="search-input" placeholder="post search...">
      </div>
    </div>
  
    <!-- dynamic list of posts -->
    <div class="posts-container" id="posts-container">
    </div>
</div>

<script type="module">
import { requireAuth, setupLogout, getUser } from "./auth.js";

// ================= AUTH =================
requireAuth();
setupLogout();

// ================= BASE URL =================
const API_BASE = "http://localhost:3000";

// ================= USER =================
const user = getUser();
const user_id = user?.id;


// ================= PROFILE IMAGE =================
async function loadProfilePic() {
    if (!user_id) return;

    try {
        const res = await fetch(`${API_BASE}/api/users/${user_id}`);
        const data = await res.json();

        const img = data.profile_pic
            ? `${API_BASE}/uploads/${data.profile_pic}?t=${Date.now()}`
            : "./images/profilepic.jpg";

        document.querySelectorAll(".profile-img").forEach(el => {
            el.src = img;
        });

    } catch (err) {
        console.error("Profile pic error:", err);
    }
}


// ================= LOAD POSTS =================
async function loadPostsByTopic() {
    const urlParams = new URLSearchParams(window.location.search);
    let topicName = urlParams.get('topic');

    if (!topicName) {
        document.getElementById('category-badge').textContent = 'Topic not found';
        return;
    }

    topicName = topicName.trim();

    document.getElementById('category-badge').textContent = topicName.toUpperCase();
    document.title = `Brain Worm — ${topicName}`;

    const container = document.getElementById('posts-container');

    container.innerHTML = `
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p>Loading...</p>
        </div>`;

    try {
        const res = await fetch(`${API_BASE}/api/posts/topic/${encodeURIComponent(topicName)}`);

        if (!res.ok) throw new Error(res.status);

        const posts = await res.json();

        container.innerHTML = '';

        if (posts.length === 0) {
            container.innerHTML = `<h4 class="text-center">No posts found</h4>`;
            return;
        }

        posts.forEach(post => {
            const avatar = post.profile_pic
                ? `${API_BASE}/uploads/${post.profile_pic}`
                : "./images/profilepic.jpg";

            container.innerHTML += `
                <div class="post-row">
                    <div class="post-title">
                        <a href="post.html?id=${post.id}">${post.title}</a>
                    </div>
                    <div class="post-desc">
                        ${post.content?.substring(0,150) || ''}...
                    </div>
                    <div class="author">
                        <span>${post.author || 'Anonymous'}</span>
                        <img src="${avatar}" class="avatar">
                    </div>
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="text-danger text-center">Failed to load posts</div>`;
    }
}


// ================= PROFILE DROPDOWN =================
document.addEventListener('DOMContentLoaded', () => {

    const profileMenu = document.querySelector('.profile-menu');

    if (profileMenu) {
        profileMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            profileMenu.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            profileMenu.classList.remove('active');
        });
    }

    loadPostsByTopic();
    loadProfilePic();
});
</script>

</body>
</html>
