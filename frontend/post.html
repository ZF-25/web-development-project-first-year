<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="post.css">
</head>
<body>
<header class="header">
  <div class="container-fluid px-3 px-md-4">
    <div class="row align-items-center">

      <!-- left column -->
      <div class="col-3 col-md-3"></div>

      <!-- central column — logo -->
      <div class="col-6 col-md-6 text-center">
        <div class="logo">
         <a href="home.html"> <img src="images/logo.png" alt="Brain Worm" class="logo-img"></a>
        </div>
      </div>

      <!-- right column — profile pic  -->
     <!-- right column — profile pic + menu -->
<div class="col-3 col-md-3 text-end">
  <div class="profile-menu">
    <div class="profile-avatar">
      <img src="images/profilepic.jpg" alt="Profile" class="profile-img">
    </div>
    <div id="dropdown" class="dropdown">
      <a href="library.html">Library</a>
      <a href="upload.html">Create Posts</a>
      <a href="settings.html">Settings</a>
      <a href="#" class="logout-btn">Logout</a>
    </div>
  </div>
</div>

    </div>
  </div>
</header>

    <div class="page container">
        <a href="home.html" class="back d-block mb-4">← back to catalogue</a>

        <div class="card" id="post-card">
    
            <div class="post-header">
                
                <!-- META: avatar + name + date -->
                <div class="post-meta">
                    <div class="author">
                        <img id="author-avatar" src="images/profilepic.jpg" alt="author" width="48" height="48">
                        <span id="author-name" class="author-name">loading...</span>
                    </div>
                    
                    <div id="post-date" class="date">loading...</div>
                </div>

                <h1 id="post-title" class="title">loading post...</h1>
            </div>

            <!-- content -->
            <div id="post-content" class="content">
                <!-- text field -->
            </div>
                    <div class="d-flex justify-content-center mt-4 mb-4">
    <button id="favorite-btn" 
        class="btn btn-outline-danger favorite-btn d-flex align-items-center gap-2 px-4 py-2">
        <span id="favorite-icon">♡</span>
        <span id="favorite-text">Add to Library</span>
    </button>
</div>
<div class="sources" id="sources-section">
    <h3>Sources</h3>
    <div id="sources-list" class="sources-list">
        <!-- link will be automatically loaded here -->
    </div>
</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
<script type="module">
import { requireAuth, getUser, setupLogout } from "./auth.js";

// ================= AUTH =================
requireAuth();
setupLogout();

// ================= BASE URL =================
const BASE_URL =
  window.location.hostname === "localhost" ||
  window.location.hostname === "127.0.0.1"
    ? "http://localhost:3000"
    : window.location.origin;

// ================= GLOBAL =================
let isFavorited = false;

// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const postId = params.get("id");

  if (!postId) {
    showError("Post ID missing");
    return;
  }

  const user = getUser();
  const user_id = user?.id;

  if (!user_id) {
    showError("User not logged in");
    return;
  }

  const favoriteBtn = document.getElementById("favorite-btn");

  // ================= LOAD POST =================
  try {
    const res = await fetch(`${BASE_URL}/api/posts/${postId}`);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const post = await res.json();

    // TITLE
    document.getElementById("post-title").textContent =
      post.title || "Untitled";

    // AUTHOR
    document.getElementById("author-name").textContent =
      post.username || "Anonymous";

    // AUTHOR IMAGE
    const avatar = document.getElementById("author-avatar");
    avatar.src = post.profile_pic
      ? `${BASE_URL}/uploads/${post.profile_pic}?t=${Date.now()}`
      : "./images/profilepic.jpg";

    avatar.onerror = () => {
      avatar.src = "./images/profilepic.jpg";
    };

    // DATE
    if (post.created_at) {
      const date = new Date(post.created_at);
      document.getElementById("post-date").textContent =
        date.toLocaleDateString();
    }

    // CONTENT
    document.getElementById("post-content").innerHTML = post.content
      ? post.content.replace(/\n/g, "<br><br>")
      : "<p>No content available</p>";

    // ================= SOURCES =================
    const sourcesList = document.getElementById("sources-list");

    if (post.sources && post.sources.length > 0) {
      sourcesList.innerHTML = "";

      post.sources.forEach(ref => {
        sourcesList.innerHTML += `
          <div class="mb-2">
            <a href="${ref}" target="_blank" rel="noopener noreferrer">
              ${ref}
            </a>
          </div>
        `;
      });

    } else {
      sourcesList.innerHTML = `
        <p class="text-muted">No sources provided</p>
      `;
    }

  } catch (err) {
    console.error("POST LOAD ERROR:", err);
    showError("Failed to load post");
    return;
  }

  // ================= PROFILE =================
  loadUserProfileImages();

  // ================= CHECK FAVORITE =================
  try {
    const res = await fetch(
      `${BASE_URL}/api/favorites/check?user_id=${user_id}&post_id=${postId}`
    );

    if (res.ok) {
      const data = await res.json();
      isFavorited = data.isFavorited || false;
      updateFavoriteUI();
    }

  } catch (err) {
    console.error("Favorite check error:", err);
  }

  // ================= TOGGLE FAVORITE =================
  if (favoriteBtn) {
    favoriteBtn.addEventListener("click", async () => {
      try {
        const url = isFavorited
          ? `${BASE_URL}/api/favorites/remove`
          : `${BASE_URL}/api/favorites`;

        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            user_id,
            post_id: postId,
          }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        isFavorited = !isFavorited;
        updateFavoriteUI();

      } catch (err) {
        console.error(err);
        alert("Failed to update library");
      }
    });
  }
});

// ================= FAVORITE UI =================
function updateFavoriteUI() {
  const icon = document.getElementById("favorite-icon");
  const text = document.getElementById("favorite-text");
  const btn = document.getElementById("favorite-btn");

  if (!icon || !text || !btn) return;

  if (isFavorited) {
    icon.textContent = "♥";
    text.textContent = "In Library";
    btn.classList.add("btn-danger", "text-white");
    btn.classList.remove("btn-outline-danger");
  } else {
    icon.textContent = "♡";
    text.textContent = "Add to Library";
    btn.classList.remove("btn-danger", "text-white");
    btn.classList.add("btn-outline-danger");
  }
}

// ================= PROFILE IMAGE =================
async function loadUserProfileImages() {
  const user = getUser();
  const user_id = user?.id;

  if (!user_id) return;

  try {
    const res = await fetch(`${BASE_URL}/api/users/${user_id}`);

    if (!res.ok) throw new Error();

    const data = await res.json();

    const imagePath = data.profile_pic
      ? `${BASE_URL}/uploads/${data.profile_pic}?t=${Date.now()}`
      : "./images/profilepic.jpg";

    document.querySelectorAll(".profile-img").forEach(img => {
      img.src = imagePath;

      img.onerror = () => {
        img.src = "./images/profilepic.jpg";
      };
    });

  } catch (err) {
    console.error("Profile image error:", err);
  }
}

// ================= ERROR UI =================
function showError(msg) {
  const card = document.getElementById("post-card");

  if (!card) return;

  card.innerHTML = `
    <div class="alert alert-danger m-4">
      <h4>Error</h4>
      <p>${msg}</p>
      <a href="home.html" class="btn btn-outline-dark">Back</a>
    </div>
  `;
}
</script>
</body>
</html>
