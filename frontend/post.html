 <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id') || params.get('post_id');

        if (!postId) {
            showError('Post not found. Missing ?id= parameter in URL');
            return;
        }

        const favoriteBtn = document.getElementById('favorite-btn');
        const favoriteIcon = document.getElementById('favorite-icon');
        const favoriteText = document.getElementById('favorite-text');

        let isFavorited = false;

        try {
            // Fetch post data
            const response = await fetch(`http://localhost:3000/api/posts/${postId}`);
            
            if (!response.ok) {
                throw new Error('Post not found');
            }

            const post = await response.json();

            // Fill post data
            document.getElementById('post-title').textContent = post.title || 'Untitled';
            document.getElementById('author-name').textContent = post.username || 'Anonymous';

            const avatar = document.getElementById('author-avatar');
            avatar.src = post.profile_pic ? `/uploads/${post.profile_pic}` : 'images/profilepic.jpeg';

            const dateEl = document.getElementById('post-date');
            if (post.created_at) {
                const date = new Date(post.created_at);
                dateEl.textContent = date.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            }

            const contentDiv = document.getElementById('post-content');
            contentDiv.innerHTML = post.content 
                ? post.content.replace(/\n/g, '<br><br>') 
                : '<p class="text-muted">No content available</p>';

            // Sources / References
            const sourcesList = document.getElementById('sources-list');
            const sources = post.sources || [];
            if (sources.length > 0) {
                sourcesList.innerHTML = sources.map(url => `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" class="d-block mb-2">
                        ${url}
                    </a>
                `).join('');
            } else {
                sourcesList.innerHTML = '<p class="text-muted">No sources provided</p>';
            }
 document.addEventListener('DOMContentLoaded', () => {
  const profileMenu = document.querySelector('.profile-menu');

  if (!profileMenu) return;

  const avatar = profileMenu.querySelector('.profile-avatar');

  // click avatar
  avatar.addEventListener('click', function(e) {
    e.stopPropagation();
    profileMenu.classList.toggle('active');
  });

  //closing when click outise of the dropdown
  document.addEventListener('click', function(e) {
    if (!profileMenu.contains(e.target)) {
      profileMenu.classList.remove('active');
    }
  });

  // Чтобы ссылки внутри дропдауна не закрывали меню сразу
  const dropdown = profileMenu.querySelector('.dropdown');
  if (dropdown) {
    dropdown.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  }
});
            // ================== FAVORITES LOGIC ==================
            const user = JSON.parse(localStorage.getItem('user')) || {};
            const user_id = user.id || 1;   // Change to real user.id after login system is ready

            // Check if post is already favorited
            const checkRes = await fetch(`http://localhost:3000/api/favorites/check?user_id=${user_id}&post_id=${postId}`);
            if (checkRes.ok) {
                const checkData = await checkRes.json();
                isFavorited = checkData.isFavorited || false;
                updateFavoriteButton();
            }
            // Toggle favorite on button click
            favoriteBtn.addEventListener('click', async () => {
                try {
                    let url = 'http://localhost:3000/api/favorites';
                    let method = 'POST';
                    let bodyData = {
                        user_id: parseInt(user_id),
                        post_id: parseInt(postId)
                    };

                    // if it was already favourite then we remove it
                    if (isFavorited) {
                        url = 'http://localhost:3000/api/favorites/remove';
                    }

                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bodyData)
                    });

                    const data = await res.json();

                    if (res.ok) {
                        isFavorited = !isFavorited;
                        updateFavoriteButton();
                    } else {
                        alert(data.message || 'Error updating favorites');
                    }
                } catch (err) {
                    console.error(err);
                    alert('Server is not responding. Make sure backend is running.');
                }
            });

        } catch (error) {
            console.error(error);
            showError('Failed to load post. Please check if server is running.');
        }

        function updateFavoriteButton() {
            if (isFavorited) {
                favoriteIcon.textContent = '♥';
                favoriteText.textContent = 'In Library';
                favoriteBtn.classList.add('btn-danger', 'text-white');
                favoriteBtn.classList.remove('btn-outline-danger');
            } else {
                favoriteIcon.textContent = '♡';
                favoriteText.textContent = 'Add to Library';
                favoriteBtn.classList.remove('btn-danger', 'text-white');
                favoriteBtn.classList.add('btn-outline-danger');
            }
        }
    });

    function showError(message) {
        const card = document.getElementById('post-card');
        card.innerHTML = `
            <div class="alert alert-danger m-4">
                <h4>Error</h4>
                <p>${message}</p>
                <a href="page.html" class="btn btn-outline-dark">Back to Catalogue</a>
            </div>
        `;
    }
</script>
