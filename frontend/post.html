<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="post.css">
</head>
<body>
<header class="header">
  <div class="container-fluid px-3 px-md-4">
    <div class="row align-items-center">

      <!-- Левая колонка (пустая или для будущих элементов) -->
      <div class="col-3 col-md-3"></div>

      <!-- Центральная колонка — ЛОГО -->
      <div class="col-6 col-md-6 text-center">
        <div class="logo">
          <img src="images/logo.png" alt="Brain Worm" class="logo-img">
        </div>
      </div>

      <!-- Правая колонка — Аватарка -->
      <div class="col-3 col-md-3 text-end">
        <div class="profile">
          <img src="images/pfp.jpg" alt="Profile">
        </div>
      </div>

    </div>
  </div>
</header>

    <div class="page container">
        <a href="page.html" class="back d-block mb-4">← back to catalogue</a>

<div class="card">
  <div class="post-header">
    
    <!-- META: аватар + имя + дата -->
    <div class="post-meta">
      <div class="author">
        <img src="images/profilepic.jpg" alt="zus">
        <span class="author-name">zus</span>
      </div>
      
      <div class="date">09.12.2021</div>
    </div>

    <!-- Название поста -->
    <h1 class="title">Name of the post</h1>

  </div>

  <!-- Остальной контент остаётся без изменений -->
  <div class="content">
    <p>Lorem Ipsum is simply dummy text...</p>
  </div>

  <div class="references mt-4">
    <h3>Sources</h3>
    <a href="#">https://example.com/source1</a>
    <a href="#">https://example.com/source2</a>
  </div>

  <div class="rating text-center mt-4">
    ★ ★ ★ ★ ☆
  </div>
</div>
    </div>

    <script type="module">

// ===============================
// IMPORT AUTH
// ===============================
import { requireAuth } from "./auth.js";

requireAuth();


// ===============================
// CONFIG
// ===============================
const API_BASE = "http://localhost:3000";


// ===============================
// GET POST ID FROM URL
// ===============================
const params = new URLSearchParams(window.location.search);
const postId = params.get("id");


// ===============================
// INIT
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  loadPost();
});


// ===============================
// LOAD POST (MAIN LOGIC)
// ===============================
async function loadPost() {
  try {
    if (!postId) {
      document.querySelector(".content").textContent = "No post selected";
      return;
    }

    const res = await fetch(`${API_BASE}/api/posts/${postId}`);
    const post = await res.json();

    if (!post) {
      document.querySelector(".content").textContent = "Post not found";
      return;
    }

    // ===============================
    // FILL DATA
    // ===============================

    // Title
    document.querySelector(".title").textContent = post.title;

    // Content
    document.querySelector(".content").textContent = post.content;

    // Author
    document.querySelector(".author-name").textContent = post.username;

    // Avatar (simple placeholder)
    const avatar = document.querySelector(".author img");
    if (avatar) {
      avatar.src = `https://i.pravatar.cc/45?u=${post.username}`;
    }

    // Date (if exists)
    if (post.created_at) {
      const dateEl = document.querySelector(".date");
      if (dateEl) {
        const formatted = new Date(post.created_at).toLocaleDateString();
        dateEl.textContent = formatted;
      }
    }

  } catch (err) {
    console.error("Post load error:", err);
    document.querySelector(".content").textContent = "Error loading post";
  }
}

</script>
</body>
</html>
