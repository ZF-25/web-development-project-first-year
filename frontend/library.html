<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link href="library.css" rel="stylesheet">

<title>brain worm - Library</title>

</head>

<body>

<div class="header">

    <div class="header-left">
        <a href="landingPage.html">
            <img src="./images/app-logo-image.png" alt="Logo" class="logo" height="170px" width="300px">
        </a>
    </div>

    <div class = "settings-title">
        <div class="title">Library  </div>
        <img src="./images/library-icon.png" alt="library-icon" width="100px" height="100px">
    </div>

    <div class="dropdown">
        <img src="./images/profilepic.jpg" class="profile-img dropdown-toggle" data-bs-toggle="dropdown">

        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="upload.html">Create Posts</a></li>
            <li><a class="dropdown-item" href="settings.html">Settings</a></li>
            <li><a class="dropdown-item logout-btn" href="#">Logout</a></li>
        </ul>
    </div>

</div>

<div class="main">

    <div class="mb-3">
        <a href="home.html"> <img src="./images/home.png" class="home" width="50px" height="50px" alt="Home"> </a>
    </div>

    <div class="main-area py-4">
        <div class="container">
            <div class="library-card p-4 shadow">

                <!-- CATEGORY TABS -->
                <div id="categories" class="d-flex flex-wrap justify-content-center gap-2 mb-3"><!-- buttons inserted by JS --></div>

                <!-- SUB CATEGORY -->
                <div id="subCategories" class="d-flex flex-wrap justify-content-center gap-2 mb-4"><!-- buttons inserted by JS --></div>

                <!-- ARTICLES GRID -->
                <div id="articles" class="row g-3"><!-- cards inserted by JS --></div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="library.js" type="module"></script>

</body>

</html>
