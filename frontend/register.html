<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brain Worm - Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./register.css">
</head>

<body>

<div class="d-flex flex-column min-vh-100">

  <!-- HEADER -->
  <header class="custom-header text-center py-3">
    <a href="landingPage.html" class="d-flex justify-content-center align-items-center gap-3 text-decoration-none">
      <img src="./images/app-logo-image-cropped.png" class="logo" alt="Brain Worm Logo">
      <span class="logo-text">Brain Worm</span>
    </a>
  </header>

  <!-- CONTENT -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center content">

    <!-- FORM START -->
    <form class="login-card" id="register-form">

      <h2 class="form-title">Registration Form</h2>

      <input 
        type="text" 
        id="username" 
        name="username"
        class="form-control" 
        placeholder="Username"
      >

      <input 
        type="email" 
        id="email" 
        name="email"
        class="form-control" 
        placeholder="Email"
      >

      <input 
        type="date" 
        id="dob" 
        name="dob"
        class="form-control"
      >

      <input 
        type="password" 
        id="password" 
        name="password"
        class="form-control" 
        placeholder="Password"
      >

      <input 
        type="password" 
        id="confirm-password" 
        name="confirmPassword"
        class="form-control" 
        placeholder="Confirm Password"
      >

      <!-- submit -->
      <button id="register-btn" type="submit" class="login-btn">
        Register
      </button>

      <div class="error" id="error-msg"></div>

      <div class="register text-center">
        Already have an account? 
        <a href="login.html">Login</a>
      </div>

    </form>
    <!-- ✅ FORM END -->

  </main>

  <!-- FOOTER -->
  <footer class="custom-header text-center py-2">
    <a href="about.html">About Us</a>
  </footer>

</div>

<script src="register.js"></script>

</body>
</html>
