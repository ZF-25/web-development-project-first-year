<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brain Worm - Register</title>

  <!-- Bootstrap (for basic styling and layout) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./register.css">
</head>

<body>

<div class="d-flex flex-column min-vh-100">

  <!-- ================= HEADER ================= -->
  <header class="custom-header text-center py-3">

    <!-- Logo + Title -->
    <a href="landingPage.html" class="d-flex justify-content-center align-items-center gap-3 text-decoration-none">
      <img src="./images/app-logo-image-cropped.png" class="logo">
      <span class="logo-text">brain worm</span>
    </a>

  </header>


  <!-- ================= MAIN CONTENT ================= -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center content">

    <!-- Registration Form -->
    <form class="login-card" id="register-form" autocomplete="on">

      <h2 class="form-title">Registration Form</h2>

      <!-- Username -->
      <input type="text" id="username" class="form-control" placeholder="Username" required>

      <!-- Email -->
      <input type="email" id="email" class="form-control" placeholder="Email" required>

      <!-- Date of Birth -->
      <input type="date" id="dob" class="form-control" required>

      <!-- Password -->
      <div class="password-wrapper">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
        <span class="toggle-password" data-target="password">👁</span>
      </div>

      <!-- Confirm Password -->
      <div class="password-wrapper">
        <input type="password" id="confirm-password" class="form-control" placeholder="Confirm Password" required>
        <span class="toggle-password" data-target="confirm-password">👁</span>
      </div>

      <!-- Submit Button -->
      <button id="register-btn" type="submit" class="login-btn">
        Register
      </button>

      <!-- Error Message -->
      <div class="error" id="error-msg"></div>

      <!-- Link to Login -->
      <div class="register text-center">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </form>

  </main>


  <!-- ================= FOOTER ================= -->
  <footer class="custom-header text-center py-2">
    <a href="about.html">About Us</a>
  </footer>

</div>

<!-- JS FILE -->
<script type="module" src="register.js"></script>

</body>
</html>
