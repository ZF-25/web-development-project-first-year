<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brain Worm - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./register.css">
</head>

<body>

<div class="d-flex flex-column min-vh-100">

  <!-- HEADER -->
  <header class="custom-header text-center py-3">
    <a href="landingPage.html" class="d-flex justify-content-center align-items-center gap-3 text-decoration-none">
      <img src="./images/app-logo-image-cropped.png" class="logo">
      <span class="logo-text">Brain Worm</span>
    </a>
  </header>

  <!-- CONTENT -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center content">

    <div class="login-card">

      <h2 class="form-title">Registration Form</h2>

      <input type="text" id="username" class="form-control" placeholder="Username">
      <input type="email" id="email" class="form-control" placeholder="Email">
      <input type="date" id="dob" class="form-control">
      <input type="password" id="password" class="form-control" placeholder="Password">
      <input type="password" id="confirm-password" class="form-control" placeholder="Confirm Password">

      <button id="register-btn" type="button" class="login-btn">Register</button>

      <div class="error" id="error-msg"></div>

      <div class="register text-center">
        Already have an account? 
        <a href="login.html">Login</a>
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="custom-header text-center py-2">
    <a href="about.html">About Us</a>
  </footer>

</div>

</body>
</html>
