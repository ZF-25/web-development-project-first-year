<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brain Worm - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./login.css">
</head>

<body>

<div class="d-flex flex-column min-vh-100">

  <!-- HEADER -->
  <header class="custom-header text-center py-3">
    <a href="landingPage.html" class="d-flex justify-content-center align-items-center gap-3 text-decoration-none">
      <img src="./images/app-logo-image-cropped.png" class="logo" alt="Brain Worm Logo">
      <span class="logo-text">Brain Worm</span>
    </a>
  </header>

  <!-- CONTENT -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center content">

    <!-- FORM START -->
    <form class="login-card" id="login-form">

      <input 
        type="text" 
        id="login-input" 
        name="identifier"
        class="form-control" 
        placeholder="Username or Email"
      >

      <!-- PASSWORD WITH TOGGLE -->
      <div class="password-wrapper">
        <input 
          type="password" 
          id="password" 
          name="password"
          class="form-control" 
          placeholder="Password"
        >
        <span class="toggle-password" data-target="password">👁</span>
      </div>

      <button id="login-btn" type="submit" class="login-btn">
        Sign in
      </button>

      <div class="error" id="error-msg"></div>

      <div class="register text-center">
        Don’t have an account? 
        <a href="register.html">Register</a>
      </div>

    </form>
    <!-- FORM END -->

  </main>

  <!-- FOOTER -->
  <footer class="custom-header text-center py-2">
    <a href="about.html">About Us</a>
  </footer>

</div>

<script src="login.js"></script>

</body>
</html>
