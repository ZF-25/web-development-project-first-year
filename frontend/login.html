<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brain Worm - Login</title>

  <!-- Bootstrap for layout -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./login.css">
</head>

<body>

<div class="d-flex flex-column min-vh-100">

  <!-- ================= HEADER ================= -->
  <header class="custom-header text-center py-3">
    <a href="landingPage.html" class="d-flex justify-content-center align-items-center gap-3 text-decoration-none">
      <img src="./images/app-logo-image-cropped.png" class="logo" alt="Logo">
      <span class="logo-text">brain worm</span>
    </a>
  </header>


  <!-- ================= MAIN CONTENT ================= -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center content">

    <!-- Login Form -->
    <form class="login-card" id="login-form" autocomplete="on">

      <!-- Username or Email -->
      <input 
        type="text" 
        id="login-input"
        class="form-control" 
        placeholder="Username or Email"
        required
      >

      <!-- Password with toggle -->
      <div class="password-wrapper">
        <input 
          type="password" 
          id="password"
          class="form-control" 
          placeholder="Password"
          required
        >
        <span class="toggle-password" data-target="password">👁</span>
      </div>

      <!-- Submit button -->
      <button id="login-btn" type="submit" class="login-btn">
        Sign in
      </button>

      <!-- Error message -->
      <div class="error" id="error-msg"></div>

      <!-- Register link -->
      <div class="register text-center">
        Don’t have an account? 
        <a href="register.html">Register</a>
      </div>

    </form>

  </main>


  <!-- ================= FOOTER ================= -->
  <footer class="custom-header text-center py-2">
    <a href="about.html">About Us</a>
  </footer>

</div>

<!-- JS -->
<script type="module" src="login.js"></script>

</body>
</html>
